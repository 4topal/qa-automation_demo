<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Makinesi</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --input-bg: #334155;
            --border-color: #475569;
            --accent-color: #14b8a6;
            --accent-hover: #0d9488;
            --result-bg: #0f172a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 320px;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #cbd5e1;
        }

        input[type="number"], select {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, select:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .result-container {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: var(--result-bg);
            border-radius: 0.5rem;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .result-label {
            font-size: 0.875rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        #sonuc {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
            min-height: 2.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h1>Hesap Makinesi</h1>
    
    <div class="input-group">
        <label for="sayi1">1. Sayı</label>
        <input type="number" id="sayi1" placeholder="Sayı girin" required step="any">
    </div>

    <div class="input-group">
        <label for="islem">İşlem</label>
        <select id="islem">
            <option value="topla">Toplama (+)</option>
            <option value="cikar">Çıkarma (-)</option>
            <option value="carp">Çarpma (×)</option>
            <option value="bol">Bölme (÷)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="sayi2">2. Sayı</label>
        <input type="number" id="sayi2" placeholder="Sayı girin" required step="any">
    </div>

    <button type="button" onclick="hesapla()">Hesapla</button>

    <div class="result-container">
        <div class="result-label">Sonuç</div>
        <div id="sonuc">-</div>
    </div>
</div>

<script>
    async function hesapla() {
        const sayi1 = document.getElementById('sayi1').value;
        const sayi2 = document.getElementById('sayi2').value;
        const islem = document.getElementById('islem').value;
        const sonucDiv = document.getElementById('sonuc');

        if (sayi1 === '' || sayi2 === '') {
            sonucDiv.textContent = 'Sayı girin';
            sonucDiv.style.color = '#ef4444'; // Red
            return;
        }

        sonucDiv.style.color = 'var(--accent-color)';
        sonucDiv.textContent = '...';

        try {
            const response = await fetch('/hesapla', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    sayi1: parseFloat(sayi1),
                    sayi2: parseFloat(sayi2),
                    islem: islem
                })
            });

            const data = await response.json();

            if (response.ok) {
                sonucDiv.textContent = data.sonuc;
            } else {
                sonucDiv.textContent = data.sonuc || 'Hata';
                sonucDiv.style.color = '#ef4444';
            }
        } catch (error) {
            sonucDiv.textContent = 'Bağlantı hatası';
            sonucDiv.style.color = '#ef4444';
            console.error('Error:', error);
        }
    }
</script>

</body>
</html>
